# Arduino-OTA deploy mode (see top-level README and update.sh).
# OTA password and Wi-Fi/MQTT settings come from the repo-root .env, not here.
ARDUINO_FQBN=arduino:renesas_uno:unor4wifi
# `sypialnia.local` does NOT resolve via mDNS on this LAN (confirmed from both
# the Mac and the Pi's avahi), and the R4 does not show up in
# `arduino-cli board list` either — so OTA must target the IP directly. This
# IP was found from the MQTT broker (the only LAN client on raspberry-hex
# :1883 besides the Pi itself). Pin it with a router DHCP reservation; if it
# changes, re-derive with:
#   ssh admin@raspberry.local 'ss -tnH state established "( sport = :1883 )"'
ARDUINO_OTA_ADDRESS=192.168.1.23
ARDUINO_SKETCH=sypialnia
