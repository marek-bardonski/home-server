# Arduino mode — M5Stack AtomS3 Lite (ESP32-S3). See top-level README + update.sh.
# Wi-Fi/MQTT/OTA secrets come from the repo-root .env, not here.
#
# The AtomS3 board is part of the Espressif esp32:esp32 core already installed
# on this host (no separate M5Stack core needed). If that core ever lacks the
# AtomS3 variant, esp32:esp32:esp32s3 is a working fallback.
ARDUINO_FQBN=esp32:esp32:m5stack_atoms3

# Deployed over USB with `./update.sh bathroom`. ESP32-S3 native USB reports a
# generic FQBN (esp32:esp32:esp32_family) in `arduino-cli board list`, never
# the board-specific one, so update.sh matches the serial port on this looser
# substring instead (compile/upload still use the exact ARDUINO_FQBN above).
ARDUINO_USB_MATCH=esp32:esp32
# Wireless OTA for ESP32 (espota) is not wired up yet — keep the board on USB.
# Non-routable placeholder so an accidental OTA attempt fails fast.
ARDUINO_OTA_ADDRESS=0.0.0.0
ARDUINO_SKETCH=bathroom
