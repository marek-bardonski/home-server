<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>home-server sensors</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  body { font-family: system-ui, sans-serif; margin: 1.5rem; background:#111; color:#eee; }
  h1 { font-size: 1.2rem; font-weight: 600; }
  .controls { display:flex; gap:1rem; align-items:center; flex-wrap:wrap; margin:1rem 0; }
  select, button { background:#222; color:#eee; border:1px solid #444; border-radius:6px;
                    padding:.4rem .6rem; font-size:.95rem; }
  #wrap { max-width: 960px; }
  canvas { background:#181818; border-radius:8px; padding:.5rem; }
  .meta { color:#888; font-size:.85rem; margin-top:.5rem; }
</style>
</head>
<body>
<div id="wrap">
  <h1>home-server sensors</h1>
  <div class="controls">
    <label>Metric
      <select id="metric"></select>
    </label>
    <label>Range
      <select id="hours">
        <option value="1">1 h</option>
        <option value="6">6 h</option>
        <option value="24" selected>24 h</option>
        <option value="168">7 d</option>
        <option value="720">30 d</option>
      </select>
    </label>
    <button id="refresh">Refresh</button>
  </div>
  <canvas id="chart" height="120"></canvas>
  <div class="meta" id="meta"></div>
</div>
<script>
const metricSel = document.getElementById('metric');
const hoursSel  = document.getElementById('hours');
const metaEl    = document.getElementById('meta');
let chart;

async function loadMetrics() {
  const list = await (await fetch('/api/metrics')).json();
  const prev = metricSel.value;
  metricSel.innerHTML = '';
  for (const m of list) {
    const o = document.createElement('option');
    o.value = JSON.stringify(m);
    o.textContent = `${m.device} · ${m.metric}`;
    metricSel.appendChild(o);
  }
  if ([...metricSel.options].some(o => o.value === prev)) metricSel.value = prev;
}

async function loadChart() {
  if (!metricSel.value) { metaEl.textContent = 'No data yet.'; return; }
  const m = JSON.parse(metricSel.value);
  const hours = hoursSel.value;
  const rows = await (await fetch(
    `/api/history?device=${encodeURIComponent(m.device)}` +
    `&metric=${encodeURIComponent(m.metric)}&hours=${hours}`)).json();
  const points = rows.map(r => ({ x: r.ts * 1000, y: r.value }));
  const data = {
    datasets: [{
      label: `${m.device} · ${m.metric}`,
      data: points,
      borderColor: '#4ea1ff',
      backgroundColor: 'rgba(78,161,255,.15)',
      fill: true, pointRadius: 0, tension: .25,
    }]
  };
  const longRange = Number(hours) > 24;
  const fmtTick = (ms) => {
    const d = new Date(ms), p = n => String(n).padStart(2, '0');
    return longRange
      ? `${p(d.getMonth() + 1)}-${p(d.getDate())} ${p(d.getHours())}:00`
      : `${p(d.getHours())}:${p(d.getMinutes())}`;
  };
  const opts = {
    animation: false,
    scales: {
      x: { type: 'linear', bounds: 'data',
           ticks: { color:'#999', maxTicksLimit: 8, autoSkip: true,
                    callback: v => fmtTick(v) },
           grid: { color:'#262626' } },
      y: { ticks: { color:'#999' }, grid: { color:'#262626' },
           title: { display: true, text: m.metric, color:'#999' } },
    },
    plugins: {
      legend: { labels: { color:'#ccc' } },
      tooltip: { callbacks: {
        title: items => items.length
          ? new Date(items[0].parsed.x).toLocaleString() : '' } },
    },
  };
  if (chart) { chart.data = data; chart.options = opts; chart.update(); }
  else { chart = new Chart(document.getElementById('chart'), { type:'line', data, options:opts }); }
  const last = rows.length ? rows[rows.length - 1] : null;
  metaEl.textContent = last
    ? `${rows.length} points · latest ${last.value} at ${new Date(last.ts*1000).toLocaleString()}`
    : 'No data in this range.';
}

// Linear x-axis with hand-formatted time labels — no external date adapter,
// so the time axis (and Refresh) work even if the box has no internet.
async function refreshAll() { await loadMetrics(); await loadChart(); }

metricSel.onchange = loadChart;
hoursSel.onchange = loadChart;
document.getElementById('refresh').onclick = refreshAll;
setInterval(refreshAll, 30000);
refreshAll();
</script>
</body>
</html>
