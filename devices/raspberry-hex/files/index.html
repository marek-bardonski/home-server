<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>home-server sensors</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  body { font-family: system-ui, sans-serif; margin: 1.5rem; background:#111; color:#eee; }
  h1 { font-size: 1.2rem; font-weight: 600; }
  .controls { display:flex; gap:1rem; align-items:center; flex-wrap:wrap; margin:1rem 0; }
  select, button { background:#222; color:#eee; border:1px solid #444; border-radius:6px;
                    padding:.4rem .6rem; font-size:.95rem; }
  #wrap { max-width: 960px; }
  canvas { background:#181818; border-radius:8px; padding:.5rem; }
  .meta { color:#888; font-size:.85rem; margin-top:.5rem; }
  table.dev { border-collapse:collapse; font-size:.9rem; margin:.75rem 0 1.25rem; }
  table.dev th, table.dev td { text-align:left; padding:.3rem .8rem .3rem 0; }
  table.dev th { color:#888; font-weight:600; border-bottom:1px solid #333; }
  table.dev td { color:#ddd; }
</style>
</head>
<body>
<div id="wrap">
  <h1>home-server sensors</h1>
  <div id="devices">Loading devices…</div>
  <div class="controls">
    <label>Metric
      <select id="metric"></select>
    </label>
    <label>Range
      <select id="hours">
        <option value="1">1 h</option>
        <option value="6">6 h</option>
        <option value="24" selected>24 h</option>
        <option value="168">7 d</option>
        <option value="720">30 d</option>
      </select>
    </label>
    <button id="refresh">Refresh</button>
  </div>
  <canvas id="chart" height="120"></canvas>
  <div class="meta" id="meta"></div>
</div>
<script>
const metricSel = document.getElementById('metric');
const hoursSel  = document.getElementById('hours');
const metaEl    = document.getElementById('meta');
const devEl     = document.getElementById('devices');
let chart;

// Per-device liveness + IP, from device_state (status/ip/presence) plus the
// freshest reading. "online" requires a recent heartbeat; a node that went
// quiet shows "stale" even if its retained status is still "online".
const ALIVE_WINDOW_S = 120;
async function loadDevices() {
  let d;
  try { d = await (await fetch('/api/latest')).json(); }
  catch (e) { devEl.textContent = 'Devices: dashboard offline.'; return; }
  const now = Date.now() / 1000;
  const dev = {};
  const touch = (name, ts) => {
    dev[name] = dev[name] || { last: 0 };
    if (ts > dev[name].last) dev[name].last = ts;
  };
  for (const r of d.readings || []) touch(r.device, r.ts);
  for (const s of d.state || []) {
    dev[s.device] = dev[s.device] || { last: 0 };
    dev[s.device][s.key] = s.value;
    if (s.ts > dev[s.device].last) dev[s.device].last = s.ts;
  }
  const names = Object.keys(dev).sort();
  if (!names.length) { devEl.textContent = 'No devices reporting yet.'; return; }
  const rows = names.map(n => {
    const o = dev[n], age = now - (o.last || 0);
    let st;
    if (o.status === 'offline') st = '<span style="color:#e66">offline</span>';
    else if (age <= ALIVE_WINDOW_S) st = '<span style="color:#5c6">online</span>';
    else st = '<span style="color:#dc3">stale</span>';
    const ago = o.last ? Math.round(age) + 's ago' : '—';
    const pres = o.presence ? ' · presence ' + o.presence : '';
    return `<tr><td>${n}</td><td>${st}</td><td>${o.ip || '—'}</td>` +
           `<td>${ago}${pres}</td></tr>`;
  });
  devEl.innerHTML =
    '<table class="dev"><thead><tr><th>device</th><th>state</th>' +
    '<th>IP</th><th>last seen</th></tr></thead><tbody>' +
    rows.join('') + '</tbody></table>';
}

async function loadMetrics() {
  const list = await (await fetch('/api/metrics')).json();
  const prev = metricSel.value;
  metricSel.innerHTML = '';
  for (const m of list) {
    const o = document.createElement('option');
    o.value = JSON.stringify(m);
    o.textContent = `${m.device} · ${m.metric}`;
    metricSel.appendChild(o);
  }
  if ([...metricSel.options].some(o => o.value === prev)) metricSel.value = prev;
}

async function loadChart() {
  if (!metricSel.value) { metaEl.textContent = 'No data yet.'; return; }
  const m = JSON.parse(metricSel.value);
  const hours = hoursSel.value;
  const rows = await (await fetch(
    `/api/history?device=${encodeURIComponent(m.device)}` +
    `&metric=${encodeURIComponent(m.metric)}&hours=${hours}`)).json();
  // Presence is a 0/1 sample-and-hold series: each row is a radar edge and
  // the value holds until the next edge. We don't use Chart.js's `stepped`
  // mode — its before/after interpretation rendered an idle gap at the
  // *next* edge's value (a false multi-hour "present" overnight). Instead we
  // expand it into an explicit square wave: at every edge emit the held
  // value, then the new one. A lead anchor assumes "off" before the first
  // known edge (no prior state is queried) and a tail anchor holds the last
  // state up to now, so an empty range reads as a flat 0 across the window.
  const isPresence = m.metric === 'presence';
  let points;
  if (isPresence) {
    const now = Date.now();
    points = [{ x: now - Number(hours) * 3600 * 1000, y: 0 }];
    let prevY = 0;
    for (const r of rows) {
      const x = r.ts * 1000;
      points.push({ x, y: prevY }, { x, y: r.value });
      prevY = r.value;
    }
    points.push({ x: now, y: prevY });
  } else {
    points = rows.map(r => ({ x: r.ts * 1000, y: r.value }));
  }
  const data = {
    datasets: [{
      label: `${m.device} · ${m.metric}`,
      data: points,
      borderColor: '#4ea1ff',
      backgroundColor: 'rgba(78,161,255,.15)',
      fill: true, pointRadius: 0,
      stepped: false,
      tension: isPresence ? 0 : .25,
    }]
  };
  const longRange = Number(hours) > 24;
  const fmtTick = (ms) => {
    const d = new Date(ms), p = n => String(n).padStart(2, '0');
    return longRange
      ? `${p(d.getMonth() + 1)}-${p(d.getDate())} ${p(d.getHours())}:00`
      : `${p(d.getHours())}:${p(d.getMinutes())}`;
  };
  const opts = {
    animation: false,
    scales: {
      x: { type: 'linear', bounds: 'data',
           ticks: { color:'#999', maxTicksLimit: 8, autoSkip: true,
                    callback: v => fmtTick(v) },
           grid: { color:'#262626' } },
      y: { ticks: { color:'#999', ...(isPresence ? { stepSize: 1 } : {}) },
           ...(isPresence ? { min: 0, max: 1 } : {}),
           grid: { color:'#262626' },
           title: { display: true, text: m.metric, color:'#999' } },
    },
    plugins: {
      legend: { labels: { color:'#ccc' } },
      tooltip: { callbacks: {
        title: items => items.length
          ? new Date(items[0].parsed.x).toLocaleString() : '' } },
    },
  };
  if (chart) { chart.data = data; chart.options = opts; chart.update(); }
  else { chart = new Chart(document.getElementById('chart'), { type:'line', data, options:opts }); }
  const last = rows.length ? rows[rows.length - 1] : null;
  metaEl.textContent = last
    ? `${rows.length} points · latest ${last.value} at ${new Date(last.ts*1000).toLocaleString()}`
    : (isPresence ? 'No presence reports in this range — showing 0.'
                  : 'No data in this range.');
}

// Linear x-axis with hand-formatted time labels — no external date adapter,
// so the time axis (and Refresh) work even if the box has no internet.
async function refreshAll() {
  await loadDevices();
  await loadMetrics();
  await loadChart();
}

metricSel.onchange = loadChart;
hoursSel.onchange = loadChart;
document.getElementById('refresh').onclick = refreshAll;
setInterval(refreshAll, 30000);
refreshAll();
</script>
</body>
</html>
